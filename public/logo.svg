<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF5A50"/>
      <stop offset="100%" style="stop-color:#E84540"/>
    </linearGradient>
  </defs>
  <!-- Background Circle -->
  <circle cx="24" cy="24" r="23" fill="url(#logoGrad)"/>

  <!-- Stylized person (iistelle "i" + person icon) -->
  <circle cx="24" cy="16" r="5" fill="white"/>
  <path d="M24 23 L24 36" stroke="white" stroke-width="4" stroke-linecap="round"/>

  <!-- Team symbol - second person silhouette -->
  <circle cx="34" cy="20" r="3" fill="white" fill-opacity="0.8"/>
  <path d="M34 24 L34 30" stroke="white" stroke-opacity="0.6" stroke-width="2.5" stroke-linecap="round"/>
</svg>